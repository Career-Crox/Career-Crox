{% extends "base.html" %}
{% block content %}
<section class="hero-card">
  <div class="hero-copy">
    <span class="eyebrow">Blueprint</span>
    <h1>CRM Feature Blueprint</h1>
    <p class="muted">This page is included so the blueprint route opens cleanly instead of throwing another dramatic server error.</p>
  </div>
</section>
<div class="page-grid two-column" style="align-items:start;">
  <div class="glass-card">
    <h3>Blueprint Notes</h3>
    <pre style="white-space:pre-wrap; font-family:inherit; line-height:1.6;">{{ blueprint_text }}</pre>
  </div>
  <div class="glass-card">
    <h3>Context Notes</h3>
    <pre style="white-space:pre-wrap; font-family:inherit; line-height:1.6;">{{ context_text }}</pre>
  </div>
</div>
{% endblock %}
